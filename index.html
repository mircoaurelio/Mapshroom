    <title>Mapshroom V3</title>
    <script>
      (function () {
        if (location.hostname === 'mircoaurelio.github.io') {
          var redirectedPath = location.pathname.replace(/^\/Mapshroom\/?/, '/') || '/';
          location.replace('https://mapshroom.dev' + redirectedPath + location.search + location.hash);
          return;
        }

        var path = location.pathname;
        var isStandalone =
          window.matchMedia('(display-mode: standalone)').matches ||
          (window.navigator.standalone === true);

        if (isStandalone && location.hash === '#/download') {
          location.replace(path + location.search + '#/');
          return;
        }

        if (/\/download\/?$/.test(path) && !location.hash) {
          location.replace(path.replace(/\/download\/?$/, '/') + '#/download');
        }
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url=https://mapshroom.dev/" />
    </noscript>
